# ============================================================================
# nginx server block for down.mr-joep.nl  (nginx 1.26, PHP-FPM 8.4)
# ============================================================================
#
# Assumes:
#   - this repository lives in            /home/dow/app
#   - the downloadable files stay in      /home/dow/public_html
#   - PHP-FPM listens on                  unix:/run/php/php8.4-fpm.sock
#
# Existing download URLs keep working unchanged: every request that is not
# /panel/* is handled by serve.php, which logs it and then hands the file
# back to nginx with X-Accel-Redirect. nginx does the actual transfer
# (sendfile, range requests, resume), so a 260 GB file never touches PHP.

server {
    listen 80;
    listen [::]:80;
    server_name down.mr-joep.nl;

    # Add your existing TLS / certbot configuration here.

    root /home/dow/app/public;

    access_log /var/log/nginx/down.access.log;
    error_log  /var/log/nginx/down.error.log;

    # Browser uploads through the panel. Raise together with
    # upload_max_filesize / post_max_size in php.ini if needed.
    client_max_body_size 2G;

    # ---- internal file delivery --------------------------------------------
    # serve.php answers with: X-Accel-Redirect: /_protected/<file>?dlid=..&tok=..
    # The prefix must match 'xaccel_prefix' in config.php.
    location /_protected/ {
        internal;
        alias /home/dow/public_html/;

        # Optional but recommended: when the transfer ends (finished or
        # aborted) nginx pings complete.php with the byte count, which is how
        # "download completed yes/no" and the live-visitors page work.
        post_action /complete.php;
    }

    # Completion callback - only reachable as an nginx subrequest.
    location = /complete.php {
        internal;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/complete.php;
        fastcgi_param DL_ARGS         $args;
        fastcgi_param BYTES_SENT      $body_bytes_sent;
        fastcgi_param REQUEST_COMPLETION $request_completion;
    }

    # ---- dashboard ------------------------------------------------------------
    location = /panel {
        return 301 /panel/;
    }

    location /panel/ {
        index index.php;
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

    # ---- everything else: the download tracker ---------------------------------
    # /file.zip, /robots.txt, 404s, scanner probes - all logged by serve.php.
    location / {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/serve.php;
    }
}

# Recommended in the http{} block of /etc/nginx/nginx.conf for large files:
#
#   sendfile on;
#   tcp_nopush on;
#   aio threads;
